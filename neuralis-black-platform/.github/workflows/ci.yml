# CI Workflow for Backend and Frontend Builds

name: CI Workflow

on:
  push:
    branches:
      - bootstrap-saas-platform
  pull_request:
    branches:
      - bootstrap-saas-platform

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Set up JDK
        uses: actions/setup-java@v2
        with:
          java-version: '11'
      - name: Build Backend
        run: ./gradlew build

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Install Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'
      - name: Install Dependencies
        run: npm install
      - name: Build Frontend
        run: npm run build
